<!doctype html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sistema PLN{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#0f1115; }
    .sidebar { width: 260px; min-height: 100vh; background:#12141b; border-right:1px solid #1e2230; position:fixed; top:0; left:0; padding:24px 16px; }
    .brand { font-weight:700; font-size:20px; }
    .content { margin-left:260px; padding:28px; }
    .card { background:#151823; border:1px solid #1f2433; border-radius:16px; }
    .nav-link { color:#cbd5e1; }
    .nav-link.active, .nav-link:hover { color:#fff; background:#1a2030; border-radius:10px; }
    .btn-primary { border-radius:12px; }
    pre { white-space:pre-wrap; background:#0b0d13; border:1px solid #1f2433; padding:16px; border-radius:12px; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <aside class="sidebar">
    <div class="brand mb-4">🧠 Sistema PLN</div>
    <nav class="nav flex-column gap-1">
      <a class="nav-link {% block nav_home %}{% endblock %}" href="{% url 'analisis:index' %}">Inicio</a>
      <a class="nav-link {% block nav_upload %}{% endblock %}" href="{% url 'analisis:upload' %}">Subir archivo</a>
      <a class="nav-link {% block nav_hist %}{% endblock %}" href="{% url 'analisis:histograma' %}">Histograma y tabla</a>
    </nav>
    <div class="mt-4 small text-secondary">© 2025</div>
  </aside>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
